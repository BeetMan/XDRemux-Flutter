name: Conformance

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  rust-build-and-test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: Build workspace
        run: cargo build --workspace

      - name: Run xdremux-core tests
        run: cargo test -p xdremux-core --lib

      - name: Run conformance tests
        run: cargo test -p xdremux-conformance

  conformance-inspect:
    runs-on: macos-latest
    needs: rust-build-and-test
    steps:
      - uses: actions/checkout@v4

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: Build workspace
        run: cargo build --workspace

      - name: Run driver (inspect only, no ffmpeg)
        run: |
          echo '{"test": true}' > /dev/null  # placeholder
        # Full driver needs external sample files and ffmpeg.
        # Once sample fixtures are hosted, uncomment:
        # python3 tests/conformance/driver.py \
        #   --sample-dir <sample-dir> \
        #   --skip-convert \
        #   --out-report conformance_report.md
